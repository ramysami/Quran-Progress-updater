<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quran Progress Updater</title>
    <style>
        :root {
            --primary-color: #2ecc71;
            --secondary-color: #27ae60;
            --bg-color: #f4f7f6;
            --text-color: #333;
            --card-bg: #fff;
            --input-bg: #fff;
            --input-border: #ddd;
            --input-text: #333;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            --border-color: #eee;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --text-color: #e0e0e0;
                --card-bg: #1e1e1e;
                --input-bg: #2c2c2c;
                --input-border: #444;
                --input-text: #ffffff;
                --shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
                --border-color: #333;
            }
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 30px;
            color: var(--secondary-color);
        }

        .form-group {
            margin-bottom: 20px;
            text-align: start;
        }

        label {
            display: block;
            font-size: 14px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--input-border);
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            background-color: var(--input-bg);
            color: var(--input-text);
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
        }

        button:not(.settings-btn):hover {
            background-color: var(--secondary-color);
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .status-msg {
            margin-top: 20px;
            font-size: 14px;
            min-height: 20px;
            line-height: 1.4;
        }

        #setup-section {
            display: none;
            border-top: 1px solid var(--border-color);
            margin-top: 25px;
            padding-top: 25px;
        }

        .settings-btn {
            background: none;
            border: none;
            color: #888;
            font-size: 12px;
            font-weight: normal;
            text-decoration: underline;
            cursor: pointer;
            margin-top: 20px;
            width: auto;
            padding: 0;
        }

        .settings-btn:hover {
            color: var(--primary-color);
        }

        /* Success/Error colors */
        .success { color: #27ae60; }
        .error { color: #e74c3c; }
        .loading { color: #3498db; }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="title">📖 Quran Progress</h1>

        <!-- Main Form -->
        <div id="main-section">
            <div class="form-group">
                <label for="surah" id="surah-label">Surah</label>
                <select id="surah">
                    <option value="">Select Surah</option>
                </select>
            </div>
            <div class="form-group">
                <label for="verse" id="verse-label">Verse Number</label>
                <input type="text" id="verse" placeholder="e.g. 10" inputmode="numeric">
            </div>
            <button id="update-btn">Update Progress</button>
            <div id="status" class="status-msg"></div>
            <button id="show-settings" class="settings-btn">Settings</button>
        </div>

        <!-- Setup Section -->
        <div id="setup-section">
            <h2 id="settings-title">Settings</h2>
            <div class="form-group">
                <label for="token" id="token-label">Todoist API Token</label>
                <input type="password" id="token" placeholder="Paste your API token">
            </div>
            <div class="form-group">
                <label for="taskId" id="taskId-label">Todoist Task ID</label>
                <input type="text" id="taskId" placeholder="Paste your Task ID">
            </div>
            <div class="form-group">
                <label for="language" id="language-label">Language</label>
                <select id="language">
                    <option value="ar">Arabic (العربية)</option>
                    <option value="en">English</option>
                </select>
            </div>
            <button id="save-settings-btn">Save & Continue</button>
            <button id="cancel-settings" class="settings-btn" style="display: none;">Cancel</button>
        </div>
    </div>

        // --- NUMERIC HELPERS ---
        function convertArabicToWestern(str) {
            return str.replace(/[٠-٩]/g, d => d.charCodeAt(0) - 1632);
        }

        function handleNumericInput(e) {
            const originalValue = e.target.value;
            const converted = convertArabicToWestern(originalValue);
            // Also filter to only allow digits
            const onlyDigits = converted.replace(/\D/g, '');
            if (e.target.value !== onlyDigits) {
                e.target.value = onlyDigits;
            }
        }

        const saveSettingsBtn = document.getElementById('save-settings-btn');
        const cancelSettingsBtn = document.getElementById('cancel-settings');

            localStorage.setItem(name, value);
        }

            return localStorage.getItem(name);
        }

            document.getElementById('title').textContent = t.title;
            document.getElementById('surah-label').textContent = t.surahLabel;
            document.getElementById('verse-label').textContent = t.verseLabel;
            document.getElementById('verse').placeholder = t.versePlaceholder;
            document.getElementById('update-btn').textContent = t.updateBtn;
            document.getElementById('show-settings').textContent = t.settingsBtn;
            document.getElementById('settings-title').textContent = t.settingsTitle;
            document.getElementById('token-label').textContent = t.tokenLabel;
            document.getElementById('token').placeholder = t.tokenPlaceholder;
            document.getElementById('taskId-label').textContent = t.taskIdLabel;
            document.getElementById('taskId').placeholder = t.taskIdPlaceholder;
            document.getElementById('language-label').textContent = t.languageLabel;
            document.getElementById('save-settings-btn').textContent = t.saveSettingsBtn;
            document.getElementById('cancel-settings').textContent = t.cancelBtn;
            
            // Set text direction
            document.body.dir = lang === 'ar' ? 'rtl' : 'ltr';
        }

        function populateSurahDropdown() {
            const language = getSetting('language') || 'ar';
            const currentSurah = surahSelect.value;
            const t = translations[language] || translations.en;
            
            surahSelect.innerHTML = `<option value="">${t.selectSurah}</option>`;
            SURAHS.forEach(s => {
                const option = document.createElement('option');
                option.value = s.number;
                option.textContent = `${s.number}. ${language === 'ar' ? s.name : s.english}`;
                surahSelect.appendChild(option);
            });
            
            if (currentSurah) {
                surahSelect.value = currentSurah;
            }
        }

        function checkSetup() {
            const token = getSetting('todoistToken');
            const taskId = getSetting('taskId');
            const language = getSetting('language') || 'ar';
            
            updateUI(language);

            if (!token || !taskId) {
                mainSection.style.display = 'none';
                setupSection.style.display = 'block';
                cancelSettingsBtn.style.display = 'none';
            } else {
                mainSection.style.display = 'block';
                setupSection.style.display = 'none';
                cancelSettingsBtn.style.display = 'inline-block';
                populateSurahDropdown();
                prefillFromTask();
                surahSelect.focus();
            }
        }

        async function prefillFromTask() {
            const token = getSetting('todoistToken');
            const taskId = getSetting('taskId');
            if (!token || !taskId) return;
            
            try {
                const response = await fetchWithRetry(`https://api.todoist.com/api/v1/tasks/${taskId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const task = await response.json();
                const content = task.content;
                
                // Match both Arabic and English URLs
                // Format: [text](https://quran.com/1?startingVerse=1) or [text](https://quran.com/ar/1?startingVerse=1)
                const match = content.match(/https:\/\/quran\.com\/(?:ar\/)?(\d+)\?startingVerse=(\d+)/);
                
                if (match) {
                    const surahNum = match[1];
                    const verseNum = match[2];
                    
                    surahSelect.value = surahNum;
                    verseInput.value = verseNum;
                }
            } catch (err) {
                console.error("Failed to prefill from task:", err);
            }
        }

        saveSettingsBtn.addEventListener('click', () => {
            const token = tokenInput.value.trim();
            const taskId = taskIdInput.value.trim();
            const language = languageSelect.value;
            const t = translations[language] || translations.en;
            
            if (token && taskId) {
                const oldLanguage = getSetting('language');
                setSetting('todoistToken', token);
                setSetting('taskId', taskId);
                setSetting('language', language);
                
                if (oldLanguage !== language) {
                    populateSurahDropdown();
                }
                
                checkSetup();
            } else {
                alert(t.fillFields);
            }
        });

        showSettingsBtn.addEventListener('click', () => {
            tokenInput.value = getSetting('todoistToken') || '';
            taskIdInput.value = getSetting('taskId') || '';
            languageSelect.value = getSetting('language') || 'ar';
            mainSection.style.display = 'none';
            setupSection.style.display = 'block';
            cancelSettingsBtn.style.display = 'inline-block';
        });

        cancelSettingsBtn.addEventListener('click', () => {
            checkSetup();
        });

        // --- NETWORK HELPERS ---
        async function fetchWithRetry(url, options = {}, retries = 3, timeout = 6000) {
            for (let i = 0; i < retries; i++) {
                try {
                    const controller = new AbortController();
                    const id = setTimeout(() => controller.abort(), timeout);
                    
                    const response = await fetch(url, { ...options, signal: controller.signal });
                    clearTimeout(id);

                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    return response;
                } catch (err) {
                    if (i === retries - 1) throw err;
                    await new Promise(res => setTimeout(res, 1500));
                }
            }
        }

        function isTodayOrOverdue(dateStr) {
            if(!dateStr) return false;
            const today = new Date().toISOString().slice(0, 10);
            return dateStr <= today;
        }

        function showStatus(msg, type = '') {
            statusDiv.textContent = msg;
            statusDiv.className = 'status-msg ' + type;
        }

        // --- MAIN LOGIC ---
        updateBtn.addEventListener('click', async () => {
            const surah = surahSelect.value;
            let verse = verseInput.value;
            const token = getSetting('todoistToken');
            const taskId = getSetting('taskId');
            const language = getSetting('language') || 'ar';
            const t = translations[language] || translations.en;

            if (!surah) {
                showStatus(t.pleaseSelectSurah, "error");
                return;
            }

            if (!verse || parseInt(verse, 10) === 0) {
                verse = '1';
                verseInput.value = '1';
            }

            updateBtn.disabled = true;
            showStatus(t.processing, "loading");

            try {
                // STEP 1: Fetch Quran Data
                showStatus(t.fetching, "loading");
                
                const quranRes = await fetchWithRetry(`https://api.alquran.cloud/v1/ayah/${surah}:${verse}/ar.alafasy`);
                const quranJson = await quranRes.json();
                const data = quranJson.data;
                
                const surahName = language === 'ar' ? data.surah.name : data.surah.englishName;
                const pageNumber = data.page;
                const juzNumber = data.juz;
                const ayahText = data.text;

                let formattedComment;
                
                if (language === 'ar') {
                    formattedComment = `سُورَةُ ${surahName} (${surah})
                الجزء: ${juzNumber}
                صفحة: ${pageNumber}
                آيه (${verse}): ${ayahText}`;
                } else {
                    formattedComment = `Surah ${surahName} (${surah})
                Juz: ${juzNumber}
                Page: ${pageNumber}
                Ayah (${verse}): ${ayahText}`;
                }

                // STEP 2: Post Comment
                showStatus(t.addingComment, "loading");
                await fetchWithRetry(`https://api.todoist.com/api/v1/comments`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        task_id: taskId,
                        content: formattedComment
                    })
                });

                // STEP 3: Update Task URL
                showStatus(t.updatingLink, "loading");
                let newUrl, newContent;
                if (language === 'ar') {
                    newUrl = `https://quran.com/ar/${surah}?startingVerse=${verse}`;
                    newContent = `[قراءة القرآن الكريم](${newUrl})`;
                } else {
                    newUrl = `https://quran.com/${surah}?startingVerse=${verse}`;
                    newContent = `[Reading the Holy Quran](${newUrl})`;
                }

                await fetchWithRetry(`https://api.todoist.com/api/v1/tasks/${taskId}`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ content: newContent })
                });

                // STEP 4: Check Completion
                showStatus(t.checkingStatus, "loading");
                const taskRes = await fetchWithRetry(`https://api.todoist.com/api/v1/tasks/${taskId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const task = await taskRes.json();
                const due = task.due?.date;

                let completionMsg = "";
                if (due && isTodayOrOverdue(due)) {
                    await fetchWithRetry(`https://api.todoist.com/api/v1/tasks/${taskId}/close`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    completionMsg = t.completedMsg;
                }

                const successMsg = t.successPrefix + `${surahName} : ${verse}${completionMsg}`;
                
                showStatus(successMsg, "success");
                verseInput.value = '';

            } catch (err) {
                console.error(err);
                showStatus(t.errorPrefix + err.message, "error");
            } finally {
                updateBtn.disabled = false;
                if (document.activeElement instanceof HTMLElement) {
                    document.activeElement.blur();
                }
            }
        });

        // Initialize
        checkSetup();
    </script>
</body>
</html>
