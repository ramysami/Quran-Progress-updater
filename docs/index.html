<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quran Progress Updater</title>
    <style>
        :root {
            --primary-color: #2ecc71;
            --secondary-color: #27ae60;
            --bg-color: #f4f7f6;
            --text-color: #333;
            --card-bg: #fff;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 30px;
            color: var(--secondary-color);
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 14px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
        }

        button:not(.settings-btn):hover {
            background-color: var(--secondary-color);
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .status-msg {
            margin-top: 20px;
            font-size: 14px;
            min-height: 20px;
        }

        #setup-section {
            display: none;
            border-top: 1px solid #eee;
            margin-top: 25px;
            padding-top: 25px;
        }

        .settings-btn {
            background: none;
            border: none;
            color: #888;
            font-size: 12px;
            font-weight: normal;
            text-decoration: underline;
            cursor: pointer;
            margin-top: 20px;
            width: auto;
            padding: 0;
        }

        .settings-btn:hover {
            color: var(--primary-color);
        }

        /* Success/Error colors */
        .success { color: #27ae60; }
        .error { color: #e74c3c; }
        .loading { color: #3498db; }
    </style>
</head>
<body>

    <div class="container">
        <h1>📖 Quran Progress</h1>

        <!-- Main Form -->
        <div id="main-section">
            <div class="form-group">
                <label for="surah">Surah Number</label>
                <input type="text" id="surah" placeholder="e.g. 18" inputmode="numeric">
            </div>
            <div class="form-group">
                <label for="verse">Verse Number</label>
                <input type="text" id="verse" placeholder="e.g. 10" inputmode="numeric">
            </div>
            <button id="update-btn">Update Progress</button>
            <div id="status" class="status-msg"></div>
            <button id="show-settings" class="settings-btn">Settings</button>
        </div>

        <!-- Setup Section -->
        <div id="setup-section">
            <h2>Settings</h2>
            <div class="form-group">
                <label for="token">Todoist API Token</label>
                <input type="password" id="token" placeholder="Paste your API token">
            </div>
            <div class="form-group">
                <label for="taskId">Todoist Task ID</label>
                <input type="text" id="taskId" placeholder="Paste your Task ID">
            </div>
            <div class="form-group">
                <label for="language">Language</label>
                <select id="language" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box;">
                    <option value="ar">Arabic (العربية)</option>
                    <option value="en">English</option>
                </select>
            </div>
            <button id="save-settings-btn">Save & Continue</button>
            <button id="cancel-settings" class="settings-btn" style="display: none;">Cancel</button>
        </div>
    </div>

    <script>
        // --- NUMERIC HELPERS ---
        function convertArabicToWestern(str) {
            return str.replace(/[٠-٩]/g, d => d.charCodeAt(0) - 1632);
        }

        function handleNumericInput(e) {
            const originalValue = e.target.value;
            const converted = convertArabicToWestern(originalValue);
            // Also filter to only allow digits
            const onlyDigits = converted.replace(/\D/g, '');
            if (e.target.value !== onlyDigits) {
                e.target.value = onlyDigits;
            }
        }

        document.getElementById('surah').addEventListener('input', (e) => {
            handleNumericInput(e);
            const val = e.target.value;
            if (val !== '') {
                const num = parseInt(val, 10);
                if (num > 114) e.target.value = '114';
            }
        });
        document.getElementById('verse').addEventListener('input', handleNumericInput);
        document.getElementById('taskId').addEventListener('input', handleNumericInput);

        // --- PERSISTENCE HELPERS ---
        function setSetting(name, value) {
            localStorage.setItem(name, value);
        }

        function getSetting(name) {
            return localStorage.getItem(name);
        }

        // --- UI LOGIC ---
        const mainSection = document.getElementById('main-section');
        const setupSection = document.getElementById('setup-section');
        const tokenInput = document.getElementById('token');
        const taskIdInput = document.getElementById('taskId');
        const languageSelect = document.getElementById('language');
        const surahInput = document.getElementById('surah');
        const verseInput = document.getElementById('verse');
        const updateBtn = document.getElementById('update-btn');
        const statusDiv = document.getElementById('status');
        const showSettingsBtn = document.getElementById('show-settings');
        const saveSettingsBtn = document.getElementById('save-settings-btn');
        const cancelSettingsBtn = document.getElementById('cancel-settings');

        function checkSetup() {
            const token = getSetting('todoistToken');
            const taskId = getSetting('taskId');
            const language = getSetting('language') || 'ar';
            
            if (!token || !taskId) {
                mainSection.style.display = 'none';
                setupSection.style.display = 'block';
                cancelSettingsBtn.style.display = 'none';
            } else {
                mainSection.style.display = 'block';
                setupSection.style.display = 'none';
                cancelSettingsBtn.style.display = 'inline-block';
            }
        }

        saveSettingsBtn.addEventListener('click', () => {
            const token = tokenInput.value.trim();
            const taskId = taskIdInput.value.trim();
            const language = languageSelect.value;
            
            if (token && taskId) {
                setSetting('todoistToken', token);
                setSetting('taskId', taskId);
                setSetting('language', language);
                checkSetup();
            } else {
                alert("Please fill in both fields.");
            }
        });

        showSettingsBtn.addEventListener('click', () => {
            tokenInput.value = getSetting('todoistToken') || '';
            taskIdInput.value = getSetting('taskId') || '';
            languageSelect.value = getSetting('language') || 'ar';
            mainSection.style.display = 'none';
            setupSection.style.display = 'block';
            cancelSettingsBtn.style.display = 'inline-block';
        });

        cancelSettingsBtn.addEventListener('click', () => {
            checkSetup();
        });

        // --- NETWORK HELPERS ---
        async function fetchWithRetry(url, options = {}, retries = 3, timeout = 6000) {
            for (let i = 0; i < retries; i++) {
                try {
                    const controller = new AbortController();
                    const id = setTimeout(() => controller.abort(), timeout);
                    
                    const response = await fetch(url, { ...options, signal: controller.signal });
                    clearTimeout(id);

                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    return response;
                } catch (err) {
                    if (i === retries - 1) throw err;
                    await new Promise(res => setTimeout(res, 1500));
                }
            }
        }

        function isTodayOrOverdue(dateStr) {
            if(!dateStr) return false;
            const today = new Date().toISOString().slice(0, 10);
            return dateStr <= today;
        }

        function showStatus(msg, type = '') {
            statusDiv.textContent = msg;
            statusDiv.className = 'status-msg ' + type;
        }

        // --- MAIN LOGIC ---
        updateBtn.addEventListener('click', async () => {
            const surah = surahInput.value;
            let verse = verseInput.value;
            const token = getSetting('todoistToken');
            const taskId = getSetting('taskId');
            const language = getSetting('language') || 'ar';

            if (!surah) {
                showStatus("Please enter a Surah number", "error");
                return;
            }

            if (!verse || parseInt(verse, 10) === 0) {
                verse = '1';
                verseInput.value = '1';
            }

            const surahNum = parseInt(surah, 10);
            if (surahNum < 1 || surahNum > 114) {
                showStatus("Surah number must be between 1 and 114", "error");
                return;
            }

            updateBtn.disabled = true;
            showStatus("⏳ Processing...", "loading");

            try {
                // STEP 1: Fetch Quran Data
                showStatus("⏳ Fetching Ayah details...", "loading");
                
                // We always fetch the Arabic edition (ar.alafasy) to get the Arabic ayah text.
                // The metadata (data.surah.englishName) is still available for English formatting.
                const quranRes = await fetchWithRetry(`https://api.alquran.cloud/v1/ayah/${surah}:${verse}/ar.alafasy`);
                const quranJson = await quranRes.json();
                const data = quranJson.data;
                
                const surahName = language === 'ar' ? data.surah.name : data.surah.englishName;
                const pageNumber = data.page;
                const juzNumber = data.juz;
                const ayahText = data.text; // This will now always be Arabic

                let formattedComment;
                
                if (language === 'ar') {
                    formattedComment = `سُورَةُ ${surahName} (${surah})
                الجزء: ${juzNumber}
                صفحة: ${pageNumber}
                آيه (${ayah}): ${ayahText}`;
                } else {
                    formattedComment = `Surah ${surahName} (${surah})
                Juz: ${juzNumber}
                Page: ${pageNumber}
                Ayah (${ayah}): ${ayahText}`;
                }

                // STEP 2: Post Comment
                showStatus("📝 Adding Todoist comment...", "loading");
                await fetchWithRetry(`https://api.todoist.com/api/v1/comments`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        task_id: taskId,
                        content: formattedComment
                    })
                });

                // STEP 3: Update Task URL
                showStatus("🔗 Updating task link...", "loading");
                let newUrl, newContent;
                if (language === 'ar') {
                    newUrl = `https://quran.com/ar/${surah}?startingVerse=${verse}`;
                    newContent = `[قراءة القرآن الكريم](${newUrl})`;
                } else {
                    newUrl = `https://quran.com/${surah}?startingVerse=${verse}`;
                    newContent = `[Reading the Holy Quran](${newUrl})`;
                }

                await fetchWithRetry(`https://api.todoist.com/api/v1/tasks/${taskId}`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ content: newContent })
                });

                // STEP 4: Check Completion
                showStatus("✅ Checking task status...", "loading");
                const taskRes = await fetchWithRetry(`https://api.todoist.com/api/v1/tasks/${taskId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const task = await taskRes.json();
                const due = task.due?.date;

                let completionMsg = "";
                if (due && isTodayOrOverdue(due)) {
                    await fetchWithRetry(`https://api.todoist.com/api/v1/tasks/${taskId}/close`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    completionMsg = " & Completed!";
                }

                showStatus(`✅ Successfully saved: ${surahName} : ${verse}${completionMsg}`, "success");
                surahInput.value = '';
                verseInput.value = '';

            } catch (err) {
                console.error(err);
                showStatus("❌ Error: " + err.message, "error");
            } finally {
                updateBtn.disabled = false;
            }
        });

        // Initialize
        checkSetup();
    </script>
</body>
</html>
