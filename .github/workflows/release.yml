name: Create Chrome Extension Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Auto-Increment Manifest Version
        run: |
          NEW_VERSION=${GITHUB_REF_NAME#v}
          jq --arg ver "$NEW_VERSION" '.version = $ver' manifest.json > tmp.json && mv tmp.json manifest.json

      - name: Prepare Extension Info
          # Extract name, replace spaces with _, and create filename
        run: |
          RAW_NAME=$(jq -r '.name' manifest.json)
          EXT_VER=$(jq -r '.version' manifest.json)
          CLEAN_NAME="${RAW_NAME// /_}"
          echo "FILENAME=${CLEAN_NAME}_v${EXT_VER}.zip" >> $GITHUB_ENV

      - name: Create Extension Zip
        run: |
          # Added your custom exclusions:
          # - assets/screenshots/* (Keep other assets, remove screens)
          # - .gemini/* (Internal AI configs)
          zip -r "${{ env.FILENAME }}" . \
            -x ".git/*" ".github/*" ".gitignore" "*.md" "tests/*" \
            "**/.DS_Store" "assets/screenshots/*" ".gemini/*" "docs/*"

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} "${{ env.FILENAME }}" \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes

