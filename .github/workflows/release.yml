name: Create Chrome Extension Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Auto-Increment Manifest Version
        run: |
          # Strip the 'v' from the tag name (e.g., v1.5.0 -> 1.5.0)
          NEW_VERSION=${GITHUB_REF_NAME#v}
          
          # Update the version field in manifest.json
          # jq '.' manifest.json ensures the JSON stays pretty-printed
          jq --arg ver "$NEW_VERSION" '.version = $ver' manifest.json > tmp.json && mv tmp.json manifest.json
          
          echo "Updated manifest.json to version $NEW_VERSION"

      - name: Prepare Extension Info
        id: info
        run: |
          RAW_NAME=$(jq -r '.name' manifest.json)
          EXT_VER=$(jq -r '.version' manifest.json)
          CLEAN_NAME="${RAW_NAME// /_}"
          FILENAME="${CLEAN_NAME}_v${EXT_VER}.zip"
          echo "FILENAME=$FILENAME" >> $GITHUB_ENV

      - name: Create Extension Zip
        run: |
          # Zip root contents (manifest.json will now have the new version)
          zip -r "${{ env.FILENAME }}" . -x ".git/*" ".github/*" ".gitignore" "*.md" "**/.DS_Store" 

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} "${{ env.FILENAME }}" \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes

